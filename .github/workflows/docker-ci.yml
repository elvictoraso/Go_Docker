name: Docker CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
  
      - name: Run Unit Tests
        run: go test -v ./...

      # 1. Configurar emulación multiplataforma con QEMU
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. Inicializar el motor avanzado de Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Autenticación en Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      # 4. Comprobación de compilación estándar (docker/build)
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ vars.DOCKERHUB_USERNAME }}/go-docker:build-test

      # 5. CORRECCIÓN: Se actualiza a la v5 para compatibilidad con Buildx >= 0.20.0
      - name: Validar Compilacion con Bake
        uses: docker/bake-action@v5
        with:
          files: ./docker-bake.hcl
          targets: default
          set: |
            *.output=type=cacheonly
